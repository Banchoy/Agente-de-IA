[phases.setup]
nixPkgs = ["node", "chromium", "glib", "nss", "atk", "cups", "pango", "cairo", "libdrm", "libxcb", "libX11", "libXcomposite", "libXdamage", "libXext", "libXfixes", "libXrandr", "libgbm", "alsa-lib"]

[phases.build]
cmds = ["npm install", "npm run build"]

[start]
cmd = "NODE_OPTIONS=--max-old-space-size=2048 npm start"
